<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek's Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to My Portfolio</h1>
    </header>
    <section id="about">
        <h2>About Me</h2>
        <p>I am a web developer with a passion for creating beautiful and functional websites. With experience in various technologies, I strive to bring designs to life and make them user-friendly.</p>
    </section>
    <section id="contact">
        <h2>Contact Me</h2>
        <form action="mailto:youremail@example.com" method="post" enctype="text/plain">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="youremail@example.com" required>
            <input type="submit" value="Submit">
        </form>
        <button onclick="location.href='mailto:youremail@example.com'">Email Me</button>
        <button onclick="location.href='https://linkedin.com/in/yourprofile'">LinkedIn Profile</button>
    </section>
    <footer>
        <p>&copy; 2026 Abhishek. All rights reserved.</p>
    </footer>
</body>
</html>
