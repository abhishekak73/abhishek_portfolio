<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Updated dot size in background animation */
        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: white;
            position: absolute;
            animation: pulse 2s infinite;
        }

        /* New cursor animation */
        .cursor {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: rgba(255, 165, 0, 0.8);
            animation: pulsing 1s infinite;
        }

        @keyframes pulsing {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.5);
            }
            100% {
                transform: scale(1);
            }
        }

        /* Glow animation class */
        .glow {
            box-shadow: 0 0 10px rgba(255, 165, 0, 1);
            transition: box-shadow 0.3s ease;
        }

        /* Applying glow class on text boxes */
        .about-section, .project-card {
            @extend .glow;
        }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <div class="animation-bg">
        <div class="dot"></div>
    </div>
    <section class="about-section">
        <h2>About Me</h2>
        <p>...</p>
    </section>
    <section class="projects">
        <div class="project-card">
            <h3>Project 1</h3>
            <p>...</p>
        </div>
        <div class="project-card">
            <h3>Project 2</h3>
            <p>...</p>
        </div>
    </section>
    <button class="explore-btn">Explore Projects</button>
</body>
</html>
